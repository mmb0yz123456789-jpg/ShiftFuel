<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Offline | ShiftFuel Concierge</title>
    <link rel="icon" href="icon-main.svg" type="image/svg+xml">
    <meta name="theme-color" content="#0d3b3b">
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0d3b3b;
        color: #fff;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at 20% 10%, rgba(22, 163, 104, .32), transparent 34%),
          linear-gradient(155deg, #12514f 0%, #0d3b3b 48%, #06231f 100%);
      }
      main {
        width: min(100%, 420px);
        border: 1px solid rgba(255, 255, 255, .16);
        border-radius: 24px;
        padding: 28px;
        background: rgba(4, 30, 28, .72);
        box-shadow: 0 24px 70px rgba(0, 0, 0, .28);
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 30px;
        font-weight: 900;
        line-height: 1.05;
        font-size: 1.4rem;
      }
      .brand img {
        width: 44px;
        height: 44px;
        border-radius: 14px;
        background: rgba(255, 255, 255, .1);
      }
      h1 {
        margin: 0 0 10px;
        font-size: clamp(2rem, 10vw, 3rem);
        line-height: .98;
      }
      p {
        margin: 0 0 22px;
        color: rgba(255, 255, 255, .78);
        font-size: 1rem;
        line-height: 1.55;
      }
      button {
        width: 100%;
        min-height: 52px;
        border: 0;
        border-radius: 16px;
        background: #118545;
        color: #fff;
        font: inherit;
        font-weight: 900;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="brand">
        <img src="icon-main.svg" alt="" aria-hidden="true">
        <span>ShiftFuel<br>Concierge</span>
      </div>
      <h1>You are offline</h1>
      <p>Your app is installed, but ShiftFuel needs a connection to load the latest booking, tracking, and account details.</p>
      <button type="button" onclick="location.reload()">Try Again</button>
    </main>
  </body>
</html>
