<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Login | ShiftFuel Concierge</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="portal-login-page admin-login-page">

  <header class="site-header">
    <a class="logo" href="index.html">ShiftFuel Concierge</a>
    <nav class="nav" aria-label="Main navigation">
      <a href="index.html#services">What we do</a>
      <a href="index.html#how">How it works</a>
      <a href="index.html#pricing">Pricing</a>
      <a href="index.html#book">Book now</a>
      <a href="track.html">Track</a>
      <a href="worker-login.html">Worker</a>
      <a href="admin-login.html">Admin</a>
    </nav>
  </header>

  <main>
    <section class="section admin-hero">
      <div class="section-heading">
        <p class="eyebrow">Admin Access</p>
        <h1>ShiftFuel Admin Portal</h1>
        <p>Enter the administrator password to continue.</p>
      </div>

      <form id="admin-login-form" class="booking-form">
        <fieldset>
          <legend>Admin Login</legend>

          <label>
            Password
            <input
              id="admin-password"
              type="password"
              placeholder="Enter admin password"
              required
            >
          </label>

          <button class="button primary" type="submit">
            Sign In
          </button>
        </fieldset>
      </form>

      <p id="login-message" class="form-status"></p>
    </section>
  </main>

  <script>
    const form = document.getElementById("admin-login-form");
    const passwordInput = document.getElementById("admin-password");
    const message = document.getElementById("login-message");

    form.addEventListener("submit", (event) => {
      event.preventDefault();

      const password = passwordInput.value;

      if (password === "ShiftFuel2026!") {
        sessionStorage.setItem("shiftfuel_admin", "true");
        window.location.href = "admin.html";
      } else {
        message.textContent = "Incorrect password.";
      }
    });
  </script>

</body>
</html>
