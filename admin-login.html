<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <base href="/">
  <title>Admin Login | ShiftFuel Concierge</title>
  <link rel="manifest" href="manifest-admin.webmanifest">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SF Admin">
  <link rel="apple-touch-icon" href="icon-admin.svg">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="landing-page portal-login-page admin-login-page">
  <script>
    // Already signed in? Skip the login screen and go straight to the portal.
    (function () {
      var token = sessionStorage.getItem("shiftfuel_admin_token");
      var expires = Number(sessionStorage.getItem("shiftfuel_admin_expires") || 0);
      if (token && expires > Date.now()) window.location.replace("/admin/dashboard");
    })();
  </script>

  <header class="portal-header unified-portal-header portal-login-header portal-staff-header">
    <a class="logo" href="index.html" aria-label="ShiftFuel Concierge home">
      <span class="logo-mark">S</span>
      <span>ShiftFuel Concierge</span>
    </a>
    <div class="portal-header-actions">
      <span class="portal-header-label">Staff Access</span>
      <a class="portal-back-link" href="index.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" aria-hidden="true"><path d="M15 18l-6-6 6-6"/></svg>
        <span>Back to home</span>
      </a>
    </div>
  </header>

  <main class="portal-login-shell">
    <section class="portal-login-card">
      <span class="portal-login-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="3"/><path d="M19.4 13.5a7.6 7.6 0 0 0 0-3l1.9-1.3-2-3.4-2.2.7a7.6 7.6 0 0 0-2.6-1.5L14 2.5h-4l-.5 2.5a7.6 7.6 0 0 0-2.6 1.5l-2.2-.7-2 3.4 1.9 1.3a7.6 7.6 0 0 0 0 3l-1.9 1.3 2 3.4 2.2-.7a7.6 7.6 0 0 0 2.6 1.5l.5 2.5h4l.5-2.5a7.6 7.6 0 0 0 2.6-1.5l2.2.7 2-3.4z"/></svg></span>
      <p class="eyebrow">Admin Access</p>
      <h1>ShiftFuel Admin Portal</h1>
      <p class="portal-login-intro">Sign in to manage requests, workers, services, and payments.</p>

      <form id="admin-login-form" class="booking-form">
        <label>
          Username
          <input
            id="admin-username"
            type="text"
            placeholder="Enter admin username"
            autocomplete="username"
            required
          >
        </label>

        <label>
          Password
          <input
            id="admin-password"
            type="password"
            placeholder="Enter admin password"
            required
          >
        </label>

        <button class="button primary" type="submit">
          Sign In
        </button>
      </form>

      <p id="login-message" class="form-status"></p>
      <a class="portal-login-back" href="index.html">Back to customer site</a>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>
  <script src="password-toggle.js"></script>
  <script>
    const adminLoginNavToggle = document.querySelector("[data-nav-toggle]");
    const adminLoginNav = document.querySelector("[data-nav]");
    adminLoginNavToggle?.addEventListener("click", () => {
      const isOpen = adminLoginNavToggle.getAttribute("aria-expanded") === "true";
      adminLoginNavToggle.setAttribute("aria-expanded", String(!isOpen));
      adminLoginNav?.classList.toggle("is-open", !isOpen);
    });

    const form = document.getElementById("admin-login-form");
    const usernameInput = document.getElementById("admin-username");
    const passwordInput = document.getElementById("admin-password");
    const message = document.getElementById("login-message");
    const LOCK_KEY = "shiftfuel_admin_locked_until";
    const ATTEMPT_KEY = "shiftfuel_admin_failed_attempts";

    async function sha256Hex(value) {
      const bytes = new TextEncoder().encode(value);
      const digest = await crypto.subtle.digest("SHA-256", bytes);
      return Array.from(new Uint8Array(digest), (byte) => byte.toString(16).padStart(2, "0")).join("");
    }

    function lockedUntil() {
      return Number(localStorage.getItem(LOCK_KEY) || 0);
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      const lockTime = lockedUntil();
      if (lockTime > Date.now()) {
        const minutes = Math.ceil((lockTime - Date.now()) / 60000);
        message.textContent = `Too many attempts. Try again in ${minutes} minute${minutes === 1 ? "" : "s"}.`;
        return;
      }

      const password = passwordInput.value;
      const username = usernameInput.value.trim().toLowerCase();
      const usernameHash = await sha256Hex(username);
      const passwordHash = await sha256Hex(password);

      message.textContent = "Signing in...";

      try {
        const { data: token, error } = await window.ShiftFuelSupabase.rpc("admin_create_session", {
          p_username_hash: usernameHash,
          p_password_hash: passwordHash,
        });

        if (error) throw error;

        localStorage.removeItem(ATTEMPT_KEY);
        localStorage.removeItem(LOCK_KEY);
        sessionStorage.setItem("shiftfuel_admin", "true");
        sessionStorage.setItem("shiftfuel_admin_token", token);
        sessionStorage.setItem("shiftfuel_admin_expires", String(Date.now() + 8 * 60 * 60 * 1000));
        sessionStorage.setItem("shiftfuel_admin_name", usernameInput.value.trim());
        window.location.href = "/admin/dashboard";
      } catch (err) {
        const msg = err?.message || "";
        if (msg.includes("ACCOUNT_LOCKED")) {
          message.textContent = "Admin login is temporarily locked. Try again in 15 minutes.";
          return;
        }
        message.textContent = "";
        const attempts = Number(localStorage.getItem(ATTEMPT_KEY) || 0) + 1;
        localStorage.setItem(ATTEMPT_KEY, String(attempts));

        if (attempts >= 3) {
          localStorage.setItem(LOCK_KEY, String(Date.now() + 15 * 60 * 1000));
          localStorage.setItem(ATTEMPT_KEY, "0");
          message.textContent = "Too many attempts. Admin login is locked for 15 minutes.";
          return;
        }

        message.textContent = `Incorrect username or password. ${3 - attempts} attempt${3 - attempts === 1 ? "" : "s"} left before a temporary lock.`;
      }
    });
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
  <script defer src="/_vercel/speed-insights/script.js"></script>

</body>
</html>
