<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <base href="/">
  <title>Admin Login | ShiftFuel Concierge</title>
  <link rel="manifest" href="manifest-admin.webmanifest">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SF Admin">
  <link rel="apple-touch-icon" href="icon-admin.svg">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="landing-page portal-login-page admin-login-page">

  <script>
    (function () {
      var token = sessionStorage.getItem("shiftfuel_admin_token");
      var expires = Number(sessionStorage.getItem("shiftfuel_admin_expires") || 0);
      if (token && expires > Date.now()) window.location.replace("/admin/dashboard");
    })();
  </script>

  <header class="portal-header unified-portal-header portal-login-header">
    <a class="logo" href="index.html" aria-label="ShiftFuel Concierge home">
      <span class="logo-mark">S</span>
      <span>ShiftFuel Concierge</span>
    </a>
    <div class="portal-header-actions">
      <span class="portal-header-label">Admin Portal</span>
      <a class="portal-back-link" href="staff-access.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" aria-hidden="true">
          <path d="M15 18l-6-6 6-6"/>
        </svg>
        <span>Back to Staff Access</span>
      </a>
    </div>
  </header>

  <main class="portal-login-shell">
    <section class="portal-login-card">
      <span class="portal-login-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 13.5a7.6 7.6 0 0 0 0-3l1.9-1.3-2-3.4-2.2.7a7.6 7.6 0 0 0-2.6-1.5L14 2.5h-4l-.5 2.5a7.6 7.6 0 0 0-2.6 1.5l-2.2-.7-2 3.4 1.9 1.3a7.6 7.6 0 0 0 0 3l-1.9 1.3 2 3.4 2.2-.7a7.6 7.6 0 0 0 2.6 1.5l.5 2.5h4l.5-2.5a7.6 7.6 0 0 0 2.6-1.5l2.2.7 2-3.4z"/>
        </svg>
      </span>
      <p class="eyebrow">Admin Access</p>
      <h1>ShiftFuel Admin Portal</h1>
      <p class="portal-login-intro">Sign in to manage requests, workers, services, and payments.</p>

      <form id="admin-login-form" class="booking-form">
        <label>
          Username
          <input id="admin-username" type="text" placeholder="Enter admin username" autocomplete="username" required>
        </label>

        <label>
          Password
          <input id="admin-password" type="password" placeholder="Enter admin password" required>
        </label>

        <button class="button primary" type="submit">Sign In</button>
      </form>

      <p id="login-message" class="form-status"></p>
      <a class="portal-login-back" href="index.html">Back to customer site</a>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>
  <script src="password-toggle.js"></script>
  <!-- Keep your original admin login JavaScript here -->
</body>
</html>
