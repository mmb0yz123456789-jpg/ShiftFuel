<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Login | ShiftFuel Concierge</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="portal-login-page admin-login-page">

  <header class="portal-header">
    <a class="logo" href="index.html">ShiftFuel Concierge</a>
    <a class="portal-back-link" href="index.html">← Back to home</a>
  </header>

  <main>
    <section class="section admin-hero">
      <div class="section-heading">
        <p class="eyebrow">Admin Access</p>
        <h1>ShiftFuel Admin Portal</h1>
        <p>Enter the administrator username and password to continue.</p>
      </div>

      <form id="admin-login-form" class="booking-form">
        <fieldset>
          <legend>Admin Login</legend>

          <label>
            Username
            <input
              id="admin-username"
              type="text"
              placeholder="Enter admin username"
              autocomplete="username"
              required
            >
          </label>

          <label>
            Password
            <input
              id="admin-password"
              type="password"
              placeholder="Enter admin password"
              required
            >
          </label>

          <button class="button primary" type="submit">
            Sign In
          </button>
        </fieldset>
      </form>

      <p id="login-message" class="form-status"></p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>
  <script>
    const form = document.getElementById("admin-login-form");
    const usernameInput = document.getElementById("admin-username");
    const passwordInput = document.getElementById("admin-password");
    const message = document.getElementById("login-message");
    const LOCK_KEY = "shiftfuel_admin_locked_until";
    const ATTEMPT_KEY = "shiftfuel_admin_failed_attempts";

    async function sha256Hex(value) {
      const bytes = new TextEncoder().encode(value);
      const digest = await crypto.subtle.digest("SHA-256", bytes);
      return Array.from(new Uint8Array(digest), (byte) => byte.toString(16).padStart(2, "0")).join("");
    }

    function lockedUntil() {
      return Number(localStorage.getItem(LOCK_KEY) || 0);
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      const lockTime = lockedUntil();
      if (lockTime > Date.now()) {
        const minutes = Math.ceil((lockTime - Date.now()) / 60000);
        message.textContent = `Too many attempts. Try again in ${minutes} minute${minutes === 1 ? "" : "s"}.`;
        return;
      }

      const password = passwordInput.value;
      const username = usernameInput.value.trim().toLowerCase();
      const usernameHash = await sha256Hex(username);
      const passwordHash = await sha256Hex(password);

      message.textContent = "Signing in...";

      try {
        const { data: token, error } = await window.ShiftFuelSupabase.rpc("admin_create_session", {
          p_username_hash: usernameHash,
          p_password_hash: passwordHash,
        });

        if (error) throw error;

        localStorage.removeItem(ATTEMPT_KEY);
        localStorage.removeItem(LOCK_KEY);
        sessionStorage.setItem("shiftfuel_admin", "true");
        sessionStorage.setItem("shiftfuel_admin_token", token);
        sessionStorage.setItem("shiftfuel_admin_expires", String(Date.now() + 8 * 60 * 60 * 1000));
        window.location.href = "admin.html";
      } catch (err) {
        const msg = err?.message || "";
        if (msg.includes("ACCOUNT_LOCKED")) {
          message.textContent = "Admin login is temporarily locked. Try again in 15 minutes.";
          return;
        }
        message.textContent = "";
        const attempts = Number(localStorage.getItem(ATTEMPT_KEY) || 0) + 1;
        localStorage.setItem(ATTEMPT_KEY, String(attempts));

        if (attempts >= 3) {
          localStorage.setItem(LOCK_KEY, String(Date.now() + 15 * 60 * 1000));
          localStorage.setItem(ATTEMPT_KEY, "0");
          message.textContent = "Too many attempts. Admin login is locked for 15 minutes.";
          return;
        }

        message.textContent = `Incorrect username or password. ${3 - attempts} attempt${3 - attempts === 1 ? "" : "s"} left before a temporary lock.`;
      }
    });
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
  <script defer src="/_vercel/speed-insights/script.js"></script>

</body>
</html>
