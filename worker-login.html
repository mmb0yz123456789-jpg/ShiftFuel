<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Worker Login | ShiftFuel Concierge</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="portal-login-page worker-login-page">
  <header class="site-header">
    <a class="logo" href="index.html">ShiftFuel Concierge</a>
    <nav class="nav" aria-label="Main navigation">
      <a href="index.html#services">What we do</a>
      <a href="index.html#how">How it works</a>
      <a href="index.html#pricing">Pricing</a>
      <a href="index.html#book">Book now</a>
      <a href="track.html">Track</a>
      <a href="worker-login.html">Worker</a>
      <a href="admin-login.html">Admin</a>
    </nav>
  </header>

  <main>
    <section class="section admin-hero">
      <div class="section-heading">
        <p class="eyebrow">Worker Access</p>
        <h1>ShiftFuel Worker Portal</h1>
        <p>Sign in to update your worker profile.</p>
      </div>

      <form id="worker-login-form" class="booking-form">
        <fieldset>
          <legend>Worker Login</legend>

          <label>
            Worker name or phone
            <input id="worker-login-name" type="text" placeholder="Enter worker name or phone" autocomplete="username" required>
          </label>

          <label>
            Password
            <input id="worker-password" type="password" placeholder="Enter worker password" required>
          </label>

          <button class="button primary" type="submit">Sign In</button>
        </fieldset>
      </form>

      <p id="worker-login-message" class="form-status"></p>
    </section>
  </main>

  <script>
    const form = document.getElementById("worker-login-form");
    const workerName = document.getElementById("worker-login-name");
    const passwordInput = document.getElementById("worker-password");
    const message = document.getElementById("worker-login-message");
    const LOCK_KEY = "shiftfuel_worker_locked_until";
    const ATTEMPT_KEY = "shiftfuel_worker_failed_attempts";

    function cleanPhone(value) {
      return String(value || "").replace(/\D/g, "");
    }

    async function sha256Hex(value) {
      const bytes = new TextEncoder().encode(value);
      const digest = await crypto.subtle.digest("SHA-256", bytes);
      return Array.from(new Uint8Array(digest), (byte) => byte.toString(16).padStart(2, "0")).join("");
    }

    function lockedUntil() {
      return Number(localStorage.getItem(LOCK_KEY) || 0);
    }

    function recordFailedAttempt() {
      const attempts = Number(localStorage.getItem(ATTEMPT_KEY) || 0) + 1;
      localStorage.setItem(ATTEMPT_KEY, String(attempts));

      if (attempts >= 5) {
        localStorage.setItem(LOCK_KEY, String(Date.now() + 5 * 60 * 1000));
        localStorage.setItem(ATTEMPT_KEY, "0");
        message.textContent = "Too many attempts. Worker login is locked for 5 minutes.";
        return;
      }

      message.textContent = `Incorrect worker name or password. ${5 - attempts} attempt${5 - attempts === 1 ? "" : "s"} left before a temporary lock.`;
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      const lockTime = lockedUntil();
      if (lockTime > Date.now()) {
        const minutes = Math.ceil((lockTime - Date.now()) / 60000);
        message.textContent = `Too many attempts. Try again in ${minutes} minute${minutes === 1 ? "" : "s"}.`;
        return;
      }

      const loginValue = workerName.value.trim();
      const password = passwordInput.value;
      message.textContent = "Signing in...";

      try {
        const { data, error } = await window.ShiftFuelSupabase
          .from("employees")
          .select("id,full_name,phone,active,worker_password_hash,worker_password_salt")
          .eq("active", true);

        if (error) throw error;

        const cleanedLoginPhone = cleanPhone(loginValue);
        const employee = (data || []).find((item) => {
          return item.full_name?.toLowerCase() === loginValue.toLowerCase()
            || (cleanedLoginPhone && cleanPhone(item.phone) === cleanedLoginPhone);
        });

        if (employee?.worker_password_hash && employee?.worker_password_salt) {
          const hash = await sha256Hex(`${employee.worker_password_salt}:${password}`);

          if (hash === employee.worker_password_hash) {
            // Create a server-side session token so write RPCs can verify identity.
            let workerToken = null;
            try {
              const { data: token, error: tokenError } = await window.ShiftFuelSupabase
                .rpc("worker_create_session", { p_employee_id: employee.id });
              if (!tokenError) workerToken = token;
            } catch {
              // Non-fatal — worker can still log in; write RPCs will reject without token.
            }
            localStorage.removeItem(ATTEMPT_KEY);
            localStorage.removeItem(LOCK_KEY);
            sessionStorage.setItem("shiftfuel_worker", employee.full_name);
            sessionStorage.setItem("shiftfuel_worker_id", employee.id);
            if (workerToken) sessionStorage.setItem("shiftfuel_worker_token", workerToken);
            sessionStorage.setItem("shiftfuel_worker_expires", String(Date.now() + 8 * 60 * 60 * 1000));
            window.location.href = "worker.html";
            return;
          }
        }
      } catch (error) {
        console.warn("Worker Supabase login failed:", error);
      }

      recordFailedAttempt();
    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>
  <script defer src="/_vercel/insights/script.js"></script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
</body>
</html>
