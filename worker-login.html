<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <base href="/">
  <title>Worker Login | ShiftFuel Concierge</title>
  <link rel="manifest" href="manifest-worker.webmanifest">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SF Worker">
  <link rel="apple-touch-icon" href="icon-worker.svg">
  <link rel="stylesheet" href="styles.css">
  <style>
    /* Installed-app (PWA) view: hide the website wayfinding links. A worker who
       opens the home-screen app didn't come from the staff/customer site, so
       "Back to Staff Access" / "Back to customer site" would just dump them onto
       the public site inside the app shell. Browser visitors still see them. */
    html.is-pwa .portal-hero-back,
    html.is-pwa .portal-login-back { display: none !important; }
    /* When the top back-arrow already returns to the customer site (visitor came
       straight from there), hide the redundant bottom "Back to customer site". */
    html.hide-bottom-back .portal-login-back { display: none !important; }
  </style>
</head>
<body class="landing-page portal-login-page worker-login-page">

  <!-- Flag the installed-app view so the website "Back to…" links can hide.
       Runs before the header paints, so the links never flash in. -->
  <script>
    (function () {
      var standalone = window.matchMedia && window.matchMedia("(display-mode: standalone)").matches;
      if (standalone || window.navigator.standalone === true) {
        document.documentElement.classList.add("is-pwa");
      }
    })();
  </script>

  <!-- Auto-redirect if already logged in -->
  <script>
    (function () {
      var token = sessionStorage.getItem("shiftfuel_worker_token");
      var expires = Number(sessionStorage.getItem("shiftfuel_worker_expires") || 0);
      if (token && expires > Date.now()) window.location.replace("/worker/dashboard");
    })();
  </script>

  <!-- Concierge sign-in hero -->
  <header class="portal-login-hero">
    <a class="portal-hero-brand" href="index.html" aria-label="ShiftFuel Concierge home">
      <span class="portal-hero-mark">S</span>
      <span class="portal-hero-wordmark">ShiftFuel<br>Concierge</span>
    </a>
    <div class="portal-hero-role">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" aria-hidden="true">
        <path d="M12 2.6 5 5.2v5.4c0 4.3 2.9 8.3 7 9.4 4.1-1.1 7-5.1 7-9.4V5.2L12 2.6z"/>
        <circle cx="12" cy="10" r="2.3"/>
        <path d="M8.4 16.4a3.8 3.8 0 0 1 7.2 0"/>
      </svg>
      <span>Worker Portal</span>
    </div>
    <a class="portal-hero-back" href="staff-access.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="M15 18l-6-6 6-6"/>
      </svg>
      <span>Back to Staff Access</span>
    </a>
  </header>

  <!-- The customer site links straight to /worker/login on desktop, but goes via
       Staff Access on mobile. So the back arrow only returns to Staff Access if the
       visitor actually came from there; otherwise it goes back to the customer site. -->
  <script>
    (function () {
      var back = document.querySelector('.portal-hero-back');
      if (!back || /staff-access/i.test(document.referrer || '')) return;
      back.setAttribute('href', 'index.html');
      var label = back.querySelector('span');
      if (label) label.textContent = 'Back to customer site';
      document.documentElement.classList.add('hide-bottom-back');
    })();
  </script>

  <main class="portal-login-shell">
    <section class="portal-login-card">
      <span class="portal-login-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" aria-hidden="true">
          <circle cx="12" cy="8" r="3.2"/>
          <path d="M5.5 19.5c0-3.2 2.9-5.6 6.5-5.6s6.5 2.4 6.5 5.6"/>
        </svg>
        Worker Access
      </span>
      <h1>ShiftFuel Worker Portal</h1>
      <p class="portal-login-intro">Sign in to view jobs, update requests, and complete services.</p>

      <form id="worker-login-form" class="booking-form">
        <label>
          Username or phone number
          <span class="portal-input-group">
            <svg class="portal-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" aria-hidden="true">
              <circle cx="12" cy="8" r="3.2"/>
              <path d="M5.5 19.5c0-3.2 2.9-5.6 6.5-5.6s6.5 2.4 6.5 5.6"/>
            </svg>
            <input id="worker-login-name" type="text" placeholder="Username or phone number" autocomplete="username" autocapitalize="none" spellcheck="false" required>
          </span>
        </label>

        <label>
          Password
          <span class="portal-input-group">
            <svg class="portal-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" aria-hidden="true">
              <rect x="5" y="10.5" width="14" height="9.5" rx="2.2"/>
              <path d="M8 10.5V7.6a4 4 0 0 1 8 0v2.9"/>
            </svg>
            <input id="worker-password" type="password" placeholder="Enter your password" required>
          </span>
        </label>

        <button class="button primary" type="submit">Sign In</button>
      </form>

      <p id="worker-login-message" class="form-status"></p>

      <div class="portal-login-divider" aria-hidden="true">
        <span class="portal-login-divider-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" aria-hidden="true">
            <path d="M12 2.6 5 5.2v5.4c0 4.3 2.9 8.3 7 9.4 4.1-1.1 7-5.1 7-9.4V5.2L12 2.6z"/>
            <path d="M9.2 11.7l2 2 3.6-3.9"/>
          </svg>
        </span>
      </div>

      <a class="portal-login-back" href="index.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" aria-hidden="true">
          <circle cx="12" cy="12" r="9"/>
          <path d="M3 12h18M12 3c2.5 2.4 3.9 5.7 3.9 9s-1.4 6.6-3.9 9c-2.5-2.4-3.9-5.7-3.9-9S9.5 5.4 12 3z"/>
        </svg>
        <span>Back to customer site</span>
      </a>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>
  <script src="password-toggle.js"></script>

  <!-- Your original login logic (unchanged) -->
  <script>
    const form = document.getElementById("worker-login-form");
    const workerName = document.getElementById("worker-login-name");
    const passwordInput = document.getElementById("worker-password");
    const message = document.getElementById("worker-login-message");
    const LOCK_KEY = "shiftfuel_worker_locked_until";
    const ATTEMPT_KEY = "shiftfuel_worker_failed_attempts";

    // This field accepts a username OR a phone number. Auto-format to
    // (XXX) XXX-XXXX only when the entry has no letters (i.e. looks like a
    // phone); leave usernames untouched. The login RPC strips non-digits, so a
    // formatted phone still matches.
    function formatLoginPhone(value) {
      const digits = String(value || "").replace(/\D/g, "").slice(0, 10);
      if (!digits) return "";
      if (digits.length <= 3) return digits;
      if (digits.length <= 6) return `(${digits.slice(0, 3)}) ${digits.slice(3)}`;
      return `(${digits.slice(0, 3)}) ${digits.slice(3, 6)}-${digits.slice(6)}`;
    }
    function maybeFormatWorkerIdentifier() {
      const raw = workerName.value;
      if (/[a-z]/i.test(raw)) return; // username — leave as typed
      workerName.value = formatLoginPhone(raw);
    }
    workerName.addEventListener("input", maybeFormatWorkerIdentifier);
    workerName.addEventListener("blur", maybeFormatWorkerIdentifier);

    function lockedUntil() {
      return Number(localStorage.getItem(LOCK_KEY) || 0);
    }

    function recordFailedAttempt() {
      const attempts = Number(localStorage.getItem(ATTEMPT_KEY) || 0) + 1;
      localStorage.setItem(ATTEMPT_KEY, String(attempts));

      if (attempts >= 3) {
        localStorage.setItem(LOCK_KEY, String(Date.now() + 15 * 60 * 1000));
        localStorage.setItem(ATTEMPT_KEY, "0");
        message.textContent = "Too many attempts. Worker login is locked for 15 minutes.";
        return;
      }
      message.textContent = `Incorrect username or password. ${3 - attempts} attempt${3 - attempts === 1 ? "" : "s"} left before a temporary lock.`;
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      const lockTime = lockedUntil();
      if (lockTime > Date.now()) {
        const minutes = Math.ceil((lockTime - Date.now()) / 60000);
        message.textContent = `Too many attempts. Try again in ${minutes} minute${minutes === 1 ? "" : "s"}.`;
        return;
      }

      const loginValue = workerName.value.trim();
      const password = passwordInput.value;
      message.textContent = "Signing in...";

      try {
        const { data, error } = await window.ShiftFuelSupabase
          .rpc("worker_login", {
            p_identifier: loginValue,
            p_password: password,
          });

        if (error) throw error;

        if (data?.token && data?.employee_id) {
          localStorage.removeItem(ATTEMPT_KEY);
          localStorage.removeItem(LOCK_KEY);
          sessionStorage.setItem("shiftfuel_worker", data.full_name || loginValue);
          sessionStorage.setItem("shiftfuel_worker_id", data.employee_id);
          sessionStorage.setItem("shiftfuel_worker_token", data.token);
          sessionStorage.setItem("shiftfuel_worker_expires", String(Date.now() + 8 * 60 * 60 * 1000));
          sessionStorage.setItem("shiftfuel_worker_must_change_pw", String(data.must_change_password === true));
          window.location.href = "/worker/dashboard";
          return;
        }
      } catch (error) {
        const msg = error?.message || "";
        if (msg.includes("ACCOUNT_LOCKED")) {
          message.textContent = "This account is temporarily locked. Try again in 15 minutes.";
          return;
        }
        console.warn("Worker login failed");
      }

      recordFailedAttempt();
    });
  </script>

  <script defer src="/_vercel/insights/script.js"></script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
</body>
</html>
