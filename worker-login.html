<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Worker Login | ShiftFuel Concierge</title>
  <link rel="manifest" href="manifest-worker.webmanifest">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SF Worker">
  <link rel="apple-touch-icon" href="icon-worker.svg">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="landing-page portal-login-page worker-login-page">
  <header class="portal-header unified-portal-header portal-login-header">
    <a class="logo" href="index.html" aria-label="ShiftFuel Concierge home">
      <span class="logo-mark">S</span>
      <span>ShiftFuel Concierge</span>
    </a>
    <nav class="portal-public-nav" aria-label="Main navigation">
      <a href="index.html#how">How It Works</a>
      <a href="index.html#services">Services &amp; Pricing</a>
      <a href="index.html#trust">Safety &amp; Trust</a>
    </nav>
    <div class="portal-cta-links">
      <a class="button primary" href="book.html#booking-flow">Book Now</a>
      <a class="button returning" href="returning.html">Returning Customer</a>
      <a class="button secondary" href="track.html">Track My Vehicle</a>
    </div>
    <div class="portal-header-actions">
      <span class="portal-header-label">Worker Portal</span>
    </div>
  </header>

  <main class="portal-login-shell">
    <section class="portal-login-card">
      <span class="portal-login-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="8" r="3.4"/><path d="M5 20c0-3.3 3.1-6 7-6s7 2.7 7 6"/></svg></span>
      <p class="eyebrow">Worker Access</p>
      <h1>ShiftFuel Worker Portal</h1>
      <p class="portal-login-intro">Sign in to access your worker portal.</p>

      <form id="worker-login-form" class="booking-form">
        <label>
          Worker name or phone
          <input id="worker-login-name" type="text" placeholder="Enter worker name or phone" autocomplete="username" required>
        </label>

        <label>
          Password
          <input id="worker-password" type="password" placeholder="Enter worker password" required>
        </label>

        <button class="button primary" type="submit">Sign In</button>
      </form>

      <p id="worker-login-message" class="form-status"></p>
    </section>
  </main>

  <script>
    const form = document.getElementById("worker-login-form");
    const workerName = document.getElementById("worker-login-name");
    const passwordInput = document.getElementById("worker-password");
    const message = document.getElementById("worker-login-message");
    const LOCK_KEY = "shiftfuel_worker_locked_until";
    const ATTEMPT_KEY = "shiftfuel_worker_failed_attempts";

    function lockedUntil() {
      return Number(localStorage.getItem(LOCK_KEY) || 0);
    }

    function recordFailedAttempt() {
      const attempts = Number(localStorage.getItem(ATTEMPT_KEY) || 0) + 1;
      localStorage.setItem(ATTEMPT_KEY, String(attempts));

      if (attempts >= 3) {
        localStorage.setItem(LOCK_KEY, String(Date.now() + 15 * 60 * 1000));
        localStorage.setItem(ATTEMPT_KEY, "0");
        message.textContent = "Too many attempts. Worker login is locked for 15 minutes.";
        return;
      }

      message.textContent = `Incorrect worker name or password. ${3 - attempts} attempt${3 - attempts === 1 ? "" : "s"} left before a temporary lock.`;
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      const lockTime = lockedUntil();
      if (lockTime > Date.now()) {
        const minutes = Math.ceil((lockTime - Date.now()) / 60000);
        message.textContent = `Too many attempts. Try again in ${minutes} minute${minutes === 1 ? "" : "s"}.`;
        return;
      }

      const loginValue = workerName.value.trim();
      const password = passwordInput.value;
      message.textContent = "Signing in...";

      try {
        // Password verification happens server-side via the worker_login RPC.
        // The browser never receives password hashes or salts.
        const { data, error } = await window.ShiftFuelSupabase
          .rpc("worker_login", {
            p_identifier: loginValue,
            p_password: password,
          });

        if (error) throw error;

        if (data?.token && data?.employee_id) {
          localStorage.removeItem(ATTEMPT_KEY);
          localStorage.removeItem(LOCK_KEY);
          sessionStorage.setItem("shiftfuel_worker", data.full_name || loginValue);
          sessionStorage.setItem("shiftfuel_worker_id", data.employee_id);
          sessionStorage.setItem("shiftfuel_worker_token", data.token);
          sessionStorage.setItem("shiftfuel_worker_expires", String(Date.now() + 8 * 60 * 60 * 1000));
          sessionStorage.setItem("shiftfuel_worker_must_change_pw", String(data.must_change_password === true));
          window.location.href = "worker.html";
          return;
        }
      } catch (error) {
        const msg = error?.message || "";
        if (msg.includes("ACCOUNT_LOCKED")) {
          message.textContent = "This account is temporarily locked. Try again in 15 minutes.";
          return;
        }
        // Do not log the message to avoid leaking which field was wrong.
        console.warn("Worker login failed");
      }

      recordFailedAttempt();
    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>
  <script>
    const workerLoginNavToggle = document.querySelector("[data-nav-toggle]");
    const workerLoginNav = document.querySelector("[data-nav]");
    workerLoginNavToggle?.addEventListener("click", () => {
      const isOpen = workerLoginNavToggle.getAttribute("aria-expanded") === "true";
      workerLoginNavToggle.setAttribute("aria-expanded", String(!isOpen));
      workerLoginNav?.classList.toggle("is-open", !isOpen);
    });
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
</body>
</html>
