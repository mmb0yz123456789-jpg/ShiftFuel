<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <base href="/">
  <title>Staff Access | ShiftFuel Concierge</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="landing-page portal-login-page staff-access-page">

  <header class="portal-header unified-portal-header">
    <a class="logo" href="index.html">
      <span class="logo-mark">S</span>
      <span>ShiftFuel Concierge</span>
    </a>
    <div class="portal-header-actions">
      <span class="portal-header-label">Staff Access</span>
    </div>
  </header>

  <main class="portal-login-shell">
    <section class="portal-login-card staff-access-card">
      <div class="staff-access-branding">
        <span class="portal-login-icon concierge-icon">🚀</span>
        <h1>Staff Access</h1>
        <p class="portal-login-intro">Choose your portal</p>
      </div>

      <div class="staff-access-buttons">
		<a href="worker-login.html" class="button staff-portal-btn worker-btn">
		  <span class="btn-icon">👷</span>
		  <strong>Worker Portal</strong>
		  <small>View jobs, update requests &amp; complete services</small>
		</a>
		
        <a href="admin-login.html" class="button staff-portal-btn admin-btn">
          <span class="btn-icon">⚙️</span>
          <strong>Admin Portal</strong>
          <small>Manage requests, workers, services &amp; payments</small>
        </a>

        <a href="/join-the-team" class="button staff-portal-btn join-btn">
          <span class="btn-icon">📋</span>
          <strong>Join the Team</strong>
          <small>Apply to become a ShiftFuel worker</small>
        </a>
      </div>

      <a href="index.html" class="portal-login-back">← Back to customer site</a>
    </section>
  </main>

  <style>
    .staff-access-card {
      max-width: 460px;
      margin: 40px auto;
      padding: 40px 24px;
    }
    .staff-access-buttons {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin: 32px 0;
    }
    .staff-portal-btn {
      padding: 20px 24px;
      text-align: left;
      border-radius: 16px;
      font-size: 1.1rem;
      height: auto;
      min-height: 110px;
      position: relative;
      transition: all 0.2s;
    }
    .staff-portal-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }
    .staff-portal-btn .btn-icon {
      font-size: 2rem;
      margin-bottom: 8px;
      display: block;
    }
    .staff-portal-btn small {
      opacity: 0.85;
      font-size: 0.95rem;
    }
    @media (max-width: 480px) {
      .staff-access-card {
        margin: 20px 12px;
        padding: 32px 20px;
      }
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>
</body>
</html>
