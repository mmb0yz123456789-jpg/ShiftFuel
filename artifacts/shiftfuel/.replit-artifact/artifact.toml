kind = "web"
previewPath = "/"
title = "ShiftFuel Concierge"
version = "1.0.0"
id = "artifacts/shiftfuel"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23752

[services.development]
run = "pnpm --filter @workspace/shiftfuel run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/shiftfuel", "run", "build" ]
publicDir = "artifacts/shiftfuel/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/staff/access"
to = "/staff-access.html"

[[services.production.rewrites]]
from = "/join-the-team"
to = "/hiring.html"

[[services.production.rewrites]]
from = "/apply"
to = "/hiring.html"

[[services.production.rewrites]]
from = "/worker/login"
to = "/worker-login.html"

[[services.production.rewrites]]
from = "/worker/dashboard"
to = "/worker.html"

[[services.production.rewrites]]
from = "/admin/login"
to = "/admin-login.html"

[[services.production.rewrites]]
from = "/admin/dashboard"
to = "/admin.html"

[[services.production.rewrites]]
from = "/"
to = "/index.html"

[services.env]
PORT = "23752"
BASE_PATH = "/"
