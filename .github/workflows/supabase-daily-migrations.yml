name: Apply Supabase migrations (daily cron - respects hobby account limits)

on:
  # Run once daily at 2:00 AM EST for hobby account compliance
  schedule:
    - cron: "0 7 * * *"  # 7 AM UTC = 2 AM EST
  
  workflow_dispatch:  # Manual trigger allowed when needed

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Verify required secrets
        run: |
          echo "Access Token: ${SUPABASE_ACCESS_TOKEN:0:10}..."
          test -n "$SUPABASE_ACCESS_TOKEN" || (echo "Missing SUPABASE_ACCESS_TOKEN" && exit 1)
          test -n "$SUPABASE_PROJECT_ID" || (echo "Missing SUPABASE_PROJECT_ID" && exit 1)
          test -n "$SUPABASE_DB_PASSWORD" || (echo "Missing SUPABASE_DB_PASSWORD" && exit 1)

      - name: Apply migrations
        run: |
          supabase link --project-ref "$SUPABASE_PROJECT_ID" \
            --access-token-file="$HOME/.supabase-token"
          supabase db push --include-all
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Verify migrations completed
        run: |
          # Check migration status via API
          supabase login --project-ref "$SUPABASE_PROJECT_ID" 2>/dev/null || true
